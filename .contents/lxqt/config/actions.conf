[FileName=shortcut-manager]
[Desktop Entry]
Type=Application
Name=Správce zástupců
Comment=Spustí utilitu pro správu zástupců ve start menu
Exec=python3 ~/.local/bin/shortcut-manager.py
Icon=system-run
Terminal=false
Categories=Utility;

[FileName=albert-search]
[Desktop Entry]
Type=Application
Name=Hledat
Comment=Hledání napříč systémem (Win + Mezerník)
Exec=albert toggle
Icon=search
Terminal=false
Categories=System;Utility;

[FileName=app-uninstaller]
[Desktop Entry]
Type=Application
Name=Odinstalovat aplikace
Comment=Umožňuje odinstalovat aplikace ze seznamu
Exec=python3 ~/.local/bin/app-uninstaller.py
Icon=trash
Terminal=false
Categories=System;Utility;

[FileName=qps-taskmanager]
[Desktop Entry]
Type=Application
Name=Správce úloh
Comment=Umožňuje ukončit spuštěné procesy
Exec=qps
Icon=qps
Terminal=false
Categories=System;Utility;